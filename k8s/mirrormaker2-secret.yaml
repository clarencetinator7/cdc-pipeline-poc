# mirrormaker2-secret.yaml
# SASL/SCRAM credentials for both MSK clusters.
#
# Replace the placeholder values with your actual credentials before applying.
# Retrieve them from AWS Secrets Manager where MSK stores SCRAM secrets:
#   aws secretsmanager get-secret-value --secret-id AmazonMSK_<your-secret-name> --region eu-west-1
#
# Apply:
#   kubectl apply -f k8s/mirrormaker2-secret.yaml -n <your-namespace>
#
# DO NOT commit real credentials. Use a secrets manager or sealed-secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: mirrormaker2-sasl-credentials
  # Change to match the namespace where your Debezium Connect is deployed.
  namespace: kafka
type: Opaque
stringData:
  # Primary MSK cluster (eu-west-1) SASL credentials
  EU_WEST_1_USERNAME: "REPLACE_WITH_EU_WEST_1_USERNAME"
  EU_WEST_1_PASSWORD: "REPLACE_WITH_EU_WEST_1_PASSWORD"

  # DR MSK cluster (eu-west-2) SASL credentials
  EU_WEST_2_USERNAME: "REPLACE_WITH_EU_WEST_2_USERNAME"
  EU_WEST_2_PASSWORD: "REPLACE_WITH_EU_WEST_2_PASSWORD"
