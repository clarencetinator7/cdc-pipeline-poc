networks:
  cdc-net:
    driver: bridge

services:

  # ─── SQL SERVER ──────────────────────────────────────────────────────────────
  # Developer edition is free and fully supports CDC.
  # MSSQL_AGENT_ENABLED is mandatory: CDC uses SQL Agent capture jobs internally.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    hostname: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1433:1433"
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "YourStrong!Passw0rd"
        -No -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cdc-net

  # ─── SQL SERVER INIT (one-shot) ───────────────────────────────────────────────
  # The mssql/server image has no entrypoint hook for .sql files (unlike Postgres).
  # This sidecar runs init.sql once after sqlserver is healthy, then exits 0.
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    # Override the image's entrypoint (launch_sqlservr.sh) so we can run sqlcmd directly.
    entrypoint: ["/bin/bash"]
    command:
      - "-c"
      - >-
        /opt/mssql-tools18/bin/sqlcmd
        -S sqlserver -U sa -P 'YourStrong!Passw0rd'
        -No -i /init.sql
        && echo 'Init script completed successfully'
    volumes:
      - ./sqlserver/init.sql:/init.sql:ro
    networks:
      - cdc-net
    restart: "no"

  # ─── PRIMARY KAFKA (KRaft) ────────────────────────────────────────────────────
  # KRaft = Kafka Raft: the broker is its own controller — no ZooKeeper needed.
  # CLUSTER_ID must be a unique 22-char URL-safe base64 UUID per cluster.
  # Two listeners:
  #   PLAINTEXT      → container-to-container (kafka:29092)
  #   PLAINTEXT_HOST → host machine access    (localhost:9092)
  #   CONTROLLER     → KRaft controller port  (kafka:9094, internal only)
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - cdc-net

  # ─── DR KAFKA (KRaft) ─────────────────────────────────────────────────────────
  # Standalone DR cluster — completely independent from the primary.
  # MirrorMaker 2 replicates topic data and checkpoints consumer offsets here.
  # CONTROLLER port 9095 avoids collision with primary's 9094.
  kafka-dr:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-dr
    hostname: kafka-dr
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "2@kafka-dr:9095"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:9095"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-dr:29093,PLAINTEXT_HOST://localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "RHU3OEVBNTcwNTJENDM2Rg"
    ports:
      - "9093:9093"
      - "29093:29093"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29093"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - cdc-net

  # ─── MIRRORMAKER 2 ────────────────────────────────────────────────────────────
  # MirrorMaker 2 (MM2) is Kafka's built-in cluster replication tool.
  # AWS MSK Replication is managed MM2 under the hood.
  # Runs in standalone mode: reads mm2.properties, starts all three mirror connectors:
  #   MirrorSourceConnector     — copies messages primary → DR (same topic name, IdentityReplicationPolicy)
  #   MirrorCheckpointConnector — syncs consumer group offsets to DR for failover
  #   MirrorHeartbeatConnector  — emits heartbeats to verify connectivity
  mirrormaker2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: mirrormaker2
    hostname: mirrormaker2
    depends_on:
      kafka:
        condition: service_healthy
      kafka-dr:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: ["/usr/bin/connect-mirror-maker /etc/mm2/mm2.properties"]
    environment:
      # connect-mirror-maker resolves log4j config relative to /usr/bin/../config/,
      # which doesn't exist. Override to the actual path in the Confluent image.
      KAFKA_LOG4J_OPTS: "-Dlog4j.configuration=file:/etc/kafka/connect-log4j.properties"
    volumes:
      - ./connect/mm2.properties:/etc/mm2/mm2.properties:ro
    networks:
      - cdc-net

  # ─── KAFKA CONNECT + DEBEZIUM ─────────────────────────────────────────────────
  # quay.io/debezium/connect ships all Debezium connectors pre-installed.
  # Waits for kafka (healthy) AND sqlserver-init (completed) before starting.
  kafka-connect:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: kafka-connect
    hostname: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    environment:
      # Set KAFKA_CONNECT_BOOTSTRAP on the host before running docker compose to switch clusters.
      # Normal:   $env:KAFKA_CONNECT_BOOTSTRAP = "kafka:29092"  (or unset — default below)
      # Failover: $env:KAFKA_CONNECT_BOOTSTRAP = "kafka-dr:29093"
      BOOTSTRAP_SERVERS: "${KAFKA_CONNECT_BOOTSTRAP:-kafka:29092}"
      GROUP_ID: "cdc-connect-group"
      CONFIG_STORAGE_TOPIC: "connect-configs"
      OFFSET_STORAGE_TOPIC: "connect-offsets"
      STATUS_STORAGE_TOPIC: "connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # JSON converter with schemas stripped → clean payload for the Python consumer
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - cdc-net
