# MirrorMaker 2 — standalone mode
# Replicates the CDC data topic, Debezium's LSN offset, and schema history
# from the primary Kafka cluster to the DR cluster.
#
# AWS MSK Replication uses these same settings under the hood — this is the
# self-hosted equivalent.
#
# IdentityReplicationPolicy: topics keep their original names on DR (no "primary." prefix).
# This means consumer.py and kafka-connect use the same topic/config on both clusters.

# ── CLUSTER ALIASES ───────────────────────────────────────────────────────────
clusters = primary, dr

# ── CLUSTER ENDPOINTS ─────────────────────────────────────────────────────────
primary.bootstrap.servers = kafka:29092
dr.bootstrap.servers = kafka-dr:29093

# ── REPLICATION DIRECTION ─────────────────────────────────────────────────────
primary->dr.enabled = true

# ── TOPIC NAMING POLICY ───────────────────────────────────────────────────────
# Default policy prefixes replicated topics with the source alias: "primary.<topic>".
# IdentityReplicationPolicy keeps the original name so topics are identical on both
# clusters — consumer.py and kafka-connect don't need different config on failover.
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# ── WHAT TO REPLICATE ─────────────────────────────────────────────────────────
# Three topics are required for a clean Debezium failover:
#   1. CDC data topic       — the actual change events the consumer reads
#   2. connect-offsets      — Debezium's last-committed LSN per connector
#   3. schema-changes.*     — Debezium's DDL history (needed to reconstruct schemas on restart)
# Dots must be escaped (regex syntax). Multiple topics separated by |.
primary->dr.topics = cdc\.CdcDemo\.dbo\.customers|connect-offsets|schema-changes\.CdcDemo

# Sync committed offsets for the Python consumer group.
primary->dr.groups = cdc-python-consumer-1

# ── OFFSET CHECKPOINTING ──────────────────────────────────────────────────────
primary->dr.emit.checkpoints.enabled = true
primary->dr.emit.checkpoints.interval.seconds = 10
primary->dr.sync.group.offsets.enabled = true
primary->dr.sync.group.offsets.interval.seconds = 10

# ── HEARTBEATS ────────────────────────────────────────────────────────────────
primary->dr.emit.heartbeats.enabled = true
primary->dr.emit.heartbeats.interval.seconds = 5

# ── DR → PRIMARY (failback) ───────────────────────────────────────────────────
# Replicates events written to DR during a disaster back to the primary cluster.
# Required so the primary is fully caught up before switching Debezium back.
#
# Circular replication protection: MM2 stamps every replicated message with a
# __mm2_source_cluster_alias header. A message that originated on primary and was
# replicated to DR will NOT be replicated back to primary — MM2 skips it.
dr->primary.enabled = true
dr->primary.topics = cdc\.CdcDemo\.dbo\.customers|connect-offsets|schema-changes\.CdcDemo
dr->primary.groups = cdc-python-consumer-1

dr->primary.emit.checkpoints.enabled = true
dr->primary.emit.checkpoints.interval.seconds = 10
dr->primary.sync.group.offsets.enabled = true
dr->primary.sync.group.offsets.interval.seconds = 10

dr->primary.emit.heartbeats.enabled = true
dr->primary.emit.heartbeats.interval.seconds = 5

# ── INTERNAL TOPIC REPLICATION ────────────────────────────────────────────────
# Must be 1 since each cluster has only a single broker.
# Data / checkpoint topics:
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1

# Kafka Connect worker internal topics (mm2-offsets/configs/status per cluster).
# These default to replication.factor=3, which fails on a single-broker cluster.
# The {alias}.{property} syntax configures the Connect worker for each cluster.
primary.offset.storage.replication.factor = 1
primary.config.storage.replication.factor = 1
primary.status.storage.replication.factor = 1
dr.offset.storage.replication.factor = 1
dr.config.storage.replication.factor = 1
dr.status.storage.replication.factor = 1
